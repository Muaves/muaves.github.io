<html lang="en">

<head>

        gtag('js', new Date());

<body>
    <div id="cookie-placeholder"></div>
    <script src="/cookies/cookie.js"></script>
    <h1>PIANO</h1>
    <div class="piano-hero">
        <button class="white-key" onclick="play('C4')" id="c4"></button>
        <button class="white-key" onclick="play('D4')" id="d4"></button>
        <button class="white-key" onclick="play('E4')" id="e4"></button>
        <button class="white-key" onclick="play('F4')" id="f4"></button>
        <button class="white-key" onclick="play('G4')" id="g4"></button>
        <button class="white-key" onclick="play('A4')" id="a4"></button>
        <button class="white-key" onclick="play('B4')" id="b4"></button>
        <button class="white-key" onclick="play('C5')" id="c5"></button>
        <button class="white-key" onclick="play('D5')" id="d5"></button>
        <button class="white-key" onclick="play('E5')" id="e5"></button>
        <button class="white-key" onclick="play('F5')" id="f5"></button>
        <button class="white-key" onclick="play('G5')" id="g5"></button>
        <button class="white-key" onclick="play('A5')" id="a5"></button>
        <button class="white-key" onclick="play('B5')" id="b5"></button>

        <button class="black-key db1" onclick="play('Db4')" id="db4"></button>
        <button class="black-key eb1" onclick="play('Eb4')" id="eb4"></button>
        <button class="black-key gb1" onclick="play('Gb4')" id="gb4"></button>
        <button class="black-key ab1" onclick="play('Ab4')" id="ab4"></button>
        <button class="black-key bb1" onclick="play('Bb4')" id="bb4"></button>
        <button class="black-key db2" onclick="play('Db5')" id="db5"></button>
        <button class="black-key eb2" onclick="play('Eb5')" id="eb5"></button>
        <button class="black-key gb2" onclick="play('Gb5')" id="gb5"></button>
        <button class="black-key ab2" onclick="play('Ab5')" id="ab5"></button>
        <button class="black-key bb2" onclick="play('Bb5')" id="bb5"></button>
    </div>

    <div id="cookie-placeholder"></div>
    <script src="script.js"></script>
    <script src="https://muaves.com/cookies/cookie.js"></script>
</body>
